services:
  web:
    image: nginx:latest
    volumes:
    - ./backend:/var/www
    - ./nginx.conf:/etc/nginx/conf.d/default.conf
    #! SSL = 443 -> azt is ki kell nyitni ilyenkor
    # PORTS -> le is exposoeolja a portot
    ports:
      - "80:80"
    env_file:
      - .env
    networks:
      - laravel-development
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    env_file:
      - .env
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend:/var/www
    networks:
      - laravel-development
    depends_on:
      - postgres
    environment:
      TZ: Europe/Budapest

  workspace:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        XDEBUG_ENABLED: false
    # Teletype: virtuális terminál, hogy majd a php artisan és ezeket tudjam használni
    # Configs-ot ki lehet szervezni -> környezeti változóba
    # https://docs.docker.com/reference/compose-file/configs/
    tty: true
    # Hogy be lehessen lépni a containerbe majd
    stdin_open: true
    env_file:
      - .env
    # Ebben nem vagyok biztos, hogy nem-e ./:var/www/public
    volumes:
      - ./backend:/var/www
    networks:
      - laravel-development
    environment:
      TZ: Europe/Budapest

  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
      # A custom postgresql.conf betöltése
    volumes:
      - postgres-data:/var/lib/postgresql/data   # Docker kezeli, nem host mappa
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      # A custom postgresql.conf betöltése command
      #? Doksi: configs
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - laravel-development

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    networks:
      - laravel-development
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: postgres-admin
    # .env-be bele tenni majd
    env_file:
      - .env
    ports:
      - ${PGADMIN_PORT:-5050}:80
    depends_on:
      postgres:
        #! Health check, utána nézni, hogyan müködik
        condition: service_healthy
    restart: unless-stopped
    networks:
      - laravel-development

  react_native:
    #? Kész: Itt is lehet EXPOSE-olni, jobb mint a Dockerfile-ban =>  "átláthatóbb"
    #  EXPOSE = Lefoglalás a PORTOT , ports <-> expose: portsnál port nyitás
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    ports:
      - "3000:3000"
      - "8081:8081"
    volumes:
        - ./frontend:/app
    env_file:
      - .env
    stdin_open: true
    tty: true

networks:
  laravel-development:

volumes:
  redis-data:
  react_node_modules:
  postgres-data: